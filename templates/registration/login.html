{% extends 'base.html' %}

{% block content %}

<div class="login-container">

    <div class="login-box">

        <h1>Login</h1>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">Entrar</button>
        </form>

        {% if form.errors %}
            <div class="msg error">
                Usuário ou senha inválidos
            </div>
        {% endif %}

    </div>

</div>
<p class="nome-fantasia">SHOW FLOW</p>
{% endblock %}
