{% extends 'base.html' %}

{% block content %}

<div class="form-box">
    <h1>Novo Pedido</h1>

    <form method="POST">
        {% csrf_token %}

        <div class="campo">
            <label>Cliente</label>
            {{ form.cliente }}
        </div>

        <div class="campo">
            <label>Produto</label>
            {{ form.produto }}
        </div>

        <div class="campo">
            <label>Quantidade</label>
            {{ form.quantidade }}
        </div>

        <button type="submit">Salvar</button>
    </form>

    <a class="link-voltar" href="{% url 'pedidos' %}">Voltar</a>
</div>

<p class="nome-fantasia">TREM FLOW</p>

{% endblock %}
