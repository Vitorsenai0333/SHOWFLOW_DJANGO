<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ShopFlow</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        .msg {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            font-weight: bold;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>

    <nav class="navbar">

    <div class="menu">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'produtos' %}">Produtos</a>
        <a href="{% url 'pedidos' %}">Pedidos</a>
        <a href="{% url 'clientes' %}">Clientes</a>
    </div>

    <div class="logout">
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit">Sair</button>
        </form>
    </div>

</nav>

    <hr>

    
    {% if messages %}
        {% for message in messages %}
            <div class="msg 
                {% if message.tags == 'success' %}success
                {% elif message.tags == 'error' %}error
                {% endif %}
            ">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}

</body>
</html>
