{% extends 'base.html' %}

{% block content %}

<div class="form-box">
    <h1>Cliente</h1>

    <form method="POST">
        {% csrf_token %}

        <div class="campo">
            <label>Nome</label>
            {{ form.nome }}
        </div>

        <div class="campo">
            <label>Email</label>
            {{ form.email }}
        </div>

        

        <button type="submit">Salvar</button>
    </form>

    <a class="link-voltar" href="{% url 'clientes' %}">Voltar</a>
</div>

<p class="nome-fantasia">TREM FLOW</p>

{% endblock %}
